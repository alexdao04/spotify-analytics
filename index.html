<html> <!-- User Form for Spotify Trends -->
<head>
    <title>Spotify Trends - User Form</title>
    <link rel="stylesheet" type="text/css" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Connect to Spotify</h1> <!-- this hyperlink should send the user to the spotify authorization page -->
        <a href="https://api.spotify.com/authorize?client_id=YOUR_CLIENT_ID&response_type=code&redirect_uri=YOUR_REDIRECT_URI&scope=YOUR_SCOPES" class="button">Login with Spotify</a>
    </div>
    <script>
        const oauth_check = new URLSearchParams(window.location.search).get('oauth');
        if(oauth_check === 'success' && oauth_check.get('code')) {
            alert('Successfully connected to Spotify! Syncing data...');
        } else if (oauth_check === 'error') {
            alert('Failed to connect to Spotify. Please try again.');
        }
    </script>
</body>
</html>
